<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account | FinReady</title>
    <meta name="description" content="Create a FinReady account to save tools, enroll in courses, and track certifications." />
    <link rel="canonical" href="https://finready.ai/register" />
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
    <link rel="stylesheet" href="assets/css/styles.css?v=20260320" />
  </head>
  <body data-page="courses">
    <a class="skip-link" href="#mainContent">Skip to content</a>
    <div data-site-header></div>

    <main id="mainContent">
      <section class="page-hero">
        <div class="container text-center">
          <span class="eyebrow">Create Account</span>
          <h1>Start Your FinReady Workspace</h1>
          <p>Create your account to save tools, track progress, and earn certifications.</p>
        </div>
      </section>

      <section class="section" style="padding-top: 20px">
        <div class="container" style="max-width: 780px">
          <div class="card auth-card">
            <form id="registerForm" data-auth-form="register">
              <div class="form-grid">
                <input name="full_name" type="text" required placeholder="Full Name" aria-label="Full Name" />
                <input name="email" type="email" required placeholder="Work Email" aria-label="Work Email" />
                <input name="password" type="password" required placeholder="Password" aria-label="Password" />
                <select name="role" aria-label="Role">
                  <option>Student</option>
                  <option>Employee</option>
                  <option>Professional</option>
                  <option>Manager</option>
                  <option>Admin</option>
                </select>
              </div>
              <div class="form-step-actions" style="margin-top: 16px">
                <button class="btn btn-primary" type="submit">Create Account</button>
                <a class="btn btn-outline" href="/login">Already have an account?</a>
              </div>
              <p class="muted" id="authMessage" style="margin-top: 10px"></p>
            </form>
          </div>
        </div>
      </section>
    </main>

    <div data-site-footer></div>

    <script src="assets/js/main.js?v=20260320"></script>
  </body>
</html>
